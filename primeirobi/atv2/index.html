<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
</head>

<body>
    <form action="#" method="post">
        <fieldset>
            <legend>Crie sua Conta</legend>

            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome" required><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="senha">Senha:</label><br>
            <input type="password" id="senha" name="senha" required minlength="8" pattern=".{8,}"><br><br>

            <strong>Gênero</strong><br>
            <label><input type="radio" name="genero" value="Masculino"> Masculino</label><br>
            <label><input type="radio" name="genero" value="Feminino"> Feminino</label><br><br>

            <label for="biografia">Biografia:</label><br>
            <textarea id="biografia" name="biografia" rows="4"
                placeholder="Conte um pouco sobre você..."></textarea><br><br>

            <label>
                <input type="checkbox" name="consentimento" required>
                Concordo com os termos de uso.
            </label><br><br>

            <button type="submit">Cadastrar</button>
        </fieldset>
    </form>
</body>

</html>
